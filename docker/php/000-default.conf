<VirtualHost *:80>
    # Docker inyecta variables en el proceso; hay que exponerlas a PHP (Apache no las hereda solas).
    PassEnv DB_HOST
    PassEnv DB_PORT
    PassEnv DB_NAME
    PassEnv DB_USER
    PassEnv DB_PASS
    PassEnv APP_BASE_URL
    PassEnv COOKIE_SECURE
    PassEnv ALLOW_BOOTSTRAP

    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
