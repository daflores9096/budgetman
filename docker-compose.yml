services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-budget_manager}
      MYSQL_USER: ${MYSQL_USER:-budget}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-budget_secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema_tables.sql:/docker-entrypoint-initdb.d/02-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=$$MYSQL_ROOT_PASSWORD mysqladmin ping -h 127.0.0.1 -uroot --silent"]
      interval: 10s
      timeout: 10s
      retries: 36
      start_period: 120s

  api:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-budget_manager}
      DB_USER: ${MYSQL_USER:-budget}
      DB_PASS: ${MYSQL_PASSWORD:-budget_secret}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:48080}
      COOKIE_SECURE: ${COOKIE_SECURE:-0}
      ALLOW_BOOTSTRAP: ${ALLOW_BOOTSTRAP:-1}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "80"

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-48080}:80"
    depends_on:
      - api

volumes:
  db_data:
